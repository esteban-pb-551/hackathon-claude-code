AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  S3 Vectors Semantic Search — serverless RAG pipeline.
  Etapa 1: S3 upload -> EventBridge -> CheckS3Vectors -> EmbedS3Vectors
  Etapa 2: API Gateway -> SearchS3Vectors -> S3 Vectors + GLM-5

Parameters:
  VoyageApiKey:
    Type: String
    NoEcho: true
    Description: API key for Voyage embeddings service

  FriendliToken:
    Type: String
    NoEcho: true
    Description: Token for Friendli inference service (Etapa 2)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  # ---------- Secrets ----------
  VoyageApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "${AWS::StackName}/voyage-api-key"
      Description: VoyageAI API key for embedding generation
      SecretString: !Ref VoyageApiKey

  FriendliTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "${AWS::StackName}/friendli-token"
      Description: Friendli API token for GLM-5 inference
      SecretString: !Ref FriendliToken

  # ---------- S3 Vectors Bucket ----------
  VectorsBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      Tags:
        - Key: voyageModel
          Value: voyage-4-large

  # ---------- S3 Upload Bucket ----------
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # ---------- CheckS3Vectors Lambda (Durable Function) ----------
  CheckS3VectorsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.13
      Handler: check_s3_vectors.handler
      CodeUri: lambdas/check-s3-vectors/
      Architectures:
        - arm64
      Timeout: 120
      DurableConfig:
        ExecutionTimeout: 600
        RetentionPeriodInDays: 7
      AutoPublishAlias: live
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]
          EMBED_FUNCTION_ARN: !GetAtt EmbedS3VectorsFunction.Arn
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:GetIndex
                - s3vectors:CreateIndex
              Resource:
                - !GetAtt VectorsBucket.VectorBucketArn
                - !Sub "${VectorsBucket.VectorBucketArn}/*"
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt EmbedS3VectorsFunction.Arn
      Events:
        S3ObjectCreated:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - "Object Created"
              detail:
                bucket:
                  name:
                    - !Ref UploadBucket
                object:
                  key:
                    - suffix: ".txt"

  # ---------- EmbedS3Vectors Lambda (Rust) ----------
  EmbedS3VectorsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: lambdas/embed-s3-vectors/
      Timeout: 300
      MemorySize: 512
      Architectures:
        - arm64
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]
          VOYAGE_SECRET_ARN: !Ref VoyageApiKeySecret
          RUST_LOG: info
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref VoyageApiKeySecret
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${UploadBucket.Arn}/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
              Resource:
                - !GetAtt VectorsBucket.VectorBucketArn
                - !Sub "${VectorsBucket.VectorBucketArn}/*"

  # ---------- Search Results Table (DynamoDB) ----------
  SearchResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ---------- SearchS3Vectors Lambda — API handler (Rust) ----------
  SearchS3VectorsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: lambdas/search-s3-vectors/
      Timeout: 29
      MemorySize: 256
      Architectures:
        - arm64
      Environment:
        Variables:
          SEARCH_RESULTS_TABLE: !Ref SearchResultsTable
          SEARCH_WORKER_ARN: !GetAtt SearchWorkerFunction.Arn
          RUST_LOG: info
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt SearchResultsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt SearchWorkerFunction.Arn
      Events:
        SearchPost:
          Type: HttpApi
          Properties:
            Path: /search
            Method: POST
            ApiId: !Ref SearchHttpApi
        SearchPoll:
          Type: HttpApi
          Properties:
            Path: /search/{requestId}
            Method: GET
            ApiId: !Ref SearchHttpApi

  # ---------- SearchWorker Lambda — RAG pipeline (Rust) ----------
  SearchWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: lambdas/search-worker/
      Timeout: 300
      MemorySize: 512
      Architectures:
        - arm64
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]
          VOYAGE_SECRET_ARN: !Ref VoyageApiKeySecret
          FRIENDLI_SECRET_ARN: !Ref FriendliTokenSecret
          SEARCH_RESULTS_TABLE: !Ref SearchResultsTable
          RUST_LOG: info
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref VoyageApiKeySecret
                - !Ref FriendliTokenSecret
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:GetIndex
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
              Resource:
                - !GetAtt VectorsBucket.VectorBucketArn
                - !Sub "${VectorsBucket.VectorBucketArn}/*"
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt SearchResultsTable.Arn

  # ---------- UploadS3 Lambda (Rust) ----------
  UploadS3Function:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: lambdas/upload-s3/
      Timeout: 29
      MemorySize: 256
      Architectures:
        - arm64
      Environment:
        Variables:
          UPLOAD_BUCKET_NAME: !Ref UploadBucket
          RUST_LOG: info
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "${UploadBucket.Arn}/*"
      Events:
        UploadPost:
          Type: HttpApi
          Properties:
            Path: /upload
            Method: POST
            ApiId: !Ref SearchHttpApi

  # ---------- Search HTTP API ----------
  SearchHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - GET
          - PUT
          - OPTIONS
        AllowHeaders:
          - Content-Type

Outputs:
  VectorsBucketName:
    Description: Name of the S3 Vectors bucket (managed by stack)
    Value: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]

  VectorsBucketArn:
    Description: ARN of the S3 Vectors bucket
    Value: !GetAtt VectorsBucket.VectorBucketArn

  UploadBucketName:
    Description: Name of the S3 upload bucket
    Value: !Ref UploadBucket

  CheckS3VectorsFunctionArn:
    Description: ARN of the CheckS3Vectors Lambda
    Value: !GetAtt CheckS3VectorsFunction.Arn

  EmbedS3VectorsFunctionArn:
    Description: ARN of the EmbedS3Vectors Lambda
    Value: !GetAtt EmbedS3VectorsFunction.Arn

  SearchApiUrl:
    Description: URL of the Search HTTP API endpoint
    Value: !Sub "https://${SearchHttpApi}.execute-api.${AWS::Region}.amazonaws.com/search"

  SearchS3VectorsFunctionArn:
    Description: ARN of the SearchS3Vectors Lambda
    Value: !GetAtt SearchS3VectorsFunction.Arn

  SearchWorkerFunctionArn:
    Description: ARN of the SearchWorker Lambda
    Value: !GetAtt SearchWorkerFunction.Arn

  SearchResultsTableName:
    Description: Name of the DynamoDB table for async search results
    Value: !Ref SearchResultsTable

  UploadS3FunctionArn:
    Description: ARN of the UploadS3 Lambda
    Value: !GetAtt UploadS3Function.Arn

  UploadApiUrl:
    Description: URL of the Upload HTTP API endpoint
    Value: !Sub "https://${SearchHttpApi}.execute-api.${AWS::Region}.amazonaws.com/upload"
