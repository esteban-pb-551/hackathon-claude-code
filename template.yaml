AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  S3 Vectors Semantic Search — serverless RAG pipeline.
  Etapa 1: S3 upload -> EventBridge -> CheckS3Vectors -> EmbedS3Vectors
  Etapa 2: API Gateway -> SearchS3Vectors -> S3 Vectors + GLM-5

Parameters:
  VoyageApiKey:
    Type: String
    NoEcho: true
    Description: API key for Voyage embeddings service

  FriendliToken:
    Type: String
    NoEcho: true
    Description: Token for Friendli inference service (Etapa 2)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  # ---------- Secrets ----------
  VoyageApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "${AWS::StackName}/voyage-api-key"
      Description: VoyageAI API key for embedding generation
      SecretString: !Ref VoyageApiKey

  FriendliTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "${AWS::StackName}/friendli-token"
      Description: Friendli API token for GLM-5 inference
      SecretString: !Ref FriendliToken

  # ---------- S3 Vectors Bucket ----------
  VectorsBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      Tags:
        - Key: voyageModel
          Value: voyage-4-large

  # ---------- S3 Upload Bucket ----------
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # ---------- CheckS3Vectors Lambda (Durable Function) ----------
  CheckS3VectorsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.13
      Handler: check_s3_vectors.handler
      CodeUri: lambdas/check-s3-vectors/
      Architectures:
        - arm64
      Timeout: 120
      DurableConfig:
        ExecutionTimeout: 600
        RetentionPeriodInDays: 7
      AutoPublishAlias: live
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]
          EMBED_FUNCTION_ARN: !GetAtt EmbedS3VectorsFunction.Arn
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:GetIndex
                - s3vectors:CreateIndex
              Resource:
                - !GetAtt VectorsBucket.VectorBucketArn
                - !Sub "${VectorsBucket.VectorBucketArn}/*"
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt EmbedS3VectorsFunction.Arn
      Events:
        S3ObjectCreated:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - "Object Created"
              detail:
                bucket:
                  name:
                    - !Ref UploadBucket
                object:
                  key:
                    - suffix: ".txt"

  # ---------- EmbedS3Vectors Lambda (Rust) ----------
  EmbedS3VectorsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: lambdas/embed-s3-vectors/
      Timeout: 300
      MemorySize: 512
      Architectures:
        - arm64
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]
          VOYAGE_SECRET_ARN: !Ref VoyageApiKeySecret
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref VoyageApiKeySecret
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${UploadBucket.Arn}/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
              Resource:
                - !GetAtt VectorsBucket.VectorBucketArn
                - !Sub "${VectorsBucket.VectorBucketArn}/*"

  # ---------- SearchS3Vectors Lambda (Rust) ----------
  SearchS3VectorsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: lambdas/search-s3-vectors/
      Timeout: 300
      MemorySize: 512
      Architectures:
        - arm64
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]
          VOYAGE_SECRET_ARN: !Ref VoyageApiKeySecret
          FRIENDLI_SECRET_ARN: !Ref FriendliTokenSecret
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref VoyageApiKeySecret
                - !Ref FriendliTokenSecret
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:GetIndex
                - s3vectors:QueryVectors
              Resource:
                - !GetAtt VectorsBucket.VectorBucketArn
                - !Sub "${VectorsBucket.VectorBucketArn}/*"
      Events:
        SearchApi:
          Type: HttpApi
          Properties:
            Path: /search
            Method: POST
            ApiId: !Ref SearchHttpApi

  # ---------- Search HTTP API ----------
  SearchHttpApi:
    Type: AWS::Serverless::HttpApi

Outputs:
  VectorsBucketName:
    Description: Name of the S3 Vectors bucket (managed by stack)
    Value: !Select [1, !Split ["/", !GetAtt VectorsBucket.VectorBucketArn]]

  VectorsBucketArn:
    Description: ARN of the S3 Vectors bucket
    Value: !GetAtt VectorsBucket.VectorBucketArn

  UploadBucketName:
    Description: Name of the S3 upload bucket
    Value: !Ref UploadBucket

  CheckS3VectorsFunctionArn:
    Description: ARN of the CheckS3Vectors Lambda
    Value: !GetAtt CheckS3VectorsFunction.Arn

  EmbedS3VectorsFunctionArn:
    Description: ARN of the EmbedS3Vectors Lambda
    Value: !GetAtt EmbedS3VectorsFunction.Arn

  SearchApiUrl:
    Description: URL of the Search HTTP API endpoint
    Value: !Sub "https://${SearchHttpApi}.execute-api.${AWS::Region}.amazonaws.com/search"

  SearchS3VectorsFunctionArn:
    Description: ARN of the SearchS3Vectors Lambda
    Value: !GetAtt SearchS3VectorsFunction.Arn
