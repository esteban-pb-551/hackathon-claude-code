<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 Vectors Semantic Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0d0f12;
    --bg-secondary: #151820;
    --bg-tertiary: #1c2029;
    --bg-input: #111318;
    --border-color: #2a2e3a;
    --border-focus: #4a6fa5;
    --text-primary: #d4d8e0;
    --text-secondary: #8a90a0;
    --text-heading: #e8ecf2;
    --accent: #4a6fa5;
    --accent-hover: #5a82bf;
    --error-bg: #2a1418;
    --error-border: #6b2a2a;
    --error-text: #d4666e;
    --success-bg: #142018;
    --success-border: #2a5a3a;
    --success-text: #6bc48a;
    --loading-color: #7a92b8;
    --font-mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  .app-container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 24px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-heading);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .header .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }

  /* Form */
  .search-form {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .form-row {
    margin-bottom: 20px;
  }

  .form-row:last-of-type {
    margin-bottom: 24px;
  }

  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .form-row label .required {
    color: var(--error-text);
    margin-left: 2px;
  }

  .form-row label .optional {
    color: var(--text-secondary);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
    margin-left: 4px;
  }

  .form-row input,
  .form-row textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: var(--font-mono);
    transition: border-color 0.15s ease;
  }

  .form-row textarea {
    resize: vertical;
    min-height: 80px;
  }

  .form-row input:focus,
  .form-row textarea:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 2px rgba(74, 111, 165, 0.15);
  }

  .form-row input::placeholder,
  .form-row textarea::placeholder {
    color: #3e4352;
  }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-search {
    padding: 10px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.15s ease;
    font-family: var(--font-sans);
  }

  .btn-search:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .btn-search:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Loading */
  .loading-indicator {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--loading-color);
    font-family: var(--font-mono);
  }

  .loading-indicator.active {
    display: flex;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-color);
    border-top-color: var(--loading-color);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Results */
  .results-section {
    display: none;
  }

  .results-section.visible {
    display: block;
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .results-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .results-meta {
    font-size: 12px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }

  .result-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 24px;
  }

  .result-card.error {
    border-color: var(--error-border);
    background: var(--error-bg);
  }

  .result-card.error .result-content {
    color: var(--error-text);
  }

  .result-card.success .result-content {
    color: var(--text-primary);
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .result-card.error .result-label {
    color: var(--error-text);
  }

  .result-card.success .result-label {
    color: var(--success-text);
  }

  .result-content {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Request summary */
  .request-summary {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-color);
    font-size: 12px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }

  .request-summary span {
    margin-right: 20px;
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border-color);
    font-size: 12px;
    color: #3e4352;
    font-family: var(--font-mono);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>S3 Vectors Semantic Search</h1>
      <div class="subtitle">POST /search &mdash; RAG pipeline backed by S3 Vectors + VoyageAI + GLM-5</div>
    </div>

    <form class="search-form" id="searchForm">
      <div class="form-row">
        <label for="indexName">Index Name <span class="required">*</span></label>
        <input type="text" id="indexName" name="index_name" required
               placeholder="e.g. movies" autocomplete="off" spellcheck="false">
      </div>

      <div class="form-row">
        <label for="query">Query <span class="required">*</span></label>
        <textarea id="query" name="query" required
                  placeholder="e.g. adventures in space" rows="3" spellcheck="false"></textarea>
      </div>

      <div class="form-row">
        <label for="filter">Filter <span class="optional">(optional)</span></label>
        <input type="text" id="filter" name="filter"
               placeholder="e.g. scifi" autocomplete="off" spellcheck="false">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-search" id="submitBtn">Search</button>
        <div class="loading-indicator" id="loadingIndicator">
          <div class="spinner"></div>
          <span>Searching... <span id="elapsed">0.0</span>s</span>
        </div>
      </div>
    </form>

    <div class="results-section" id="resultsSection">
      <div class="results-header">
        <h2>Response</h2>
        <div class="results-meta" id="resultsMeta"></div>
      </div>
      <div class="result-card" id="resultCard">
        <div class="result-label" id="resultLabel"></div>
        <div class="result-content" id="resultContent"></div>
      </div>
      <div class="request-summary" id="requestSummary"></div>
    </div>

    <div class="footer">
      S3 Vectors Semantic Search &mdash; Serverless RAG Pipeline
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ── Configuration ──────────────────────────────────────────────────
  const API_URL = "https://rlwozruimc.execute-api.us-east-1.amazonaws.com/search";
  // ──────────────────────────────────────────────────────────────────

  var form = document.getElementById("searchForm");
  var submitBtn = document.getElementById("submitBtn");
  var loadingIndicator = document.getElementById("loadingIndicator");
  var elapsedSpan = document.getElementById("elapsed");
  var resultsSection = document.getElementById("resultsSection");
  var resultCard = document.getElementById("resultCard");
  var resultLabel = document.getElementById("resultLabel");
  var resultContent = document.getElementById("resultContent");
  var resultsMeta = document.getElementById("resultsMeta");
  var requestSummary = document.getElementById("requestSummary");

  var timerInterval = null;
  var startTime = 0;

  function startTimer() {
    startTime = Date.now();
    elapsedSpan.textContent = "0.0";
    loadingIndicator.classList.add("active");
    timerInterval = setInterval(function () {
      var seconds = ((Date.now() - startTime) / 1000).toFixed(1);
      elapsedSpan.textContent = seconds;
    }, 100);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    loadingIndicator.classList.remove("active");
  }

  function getElapsed() {
    return ((Date.now() - startTime) / 1000).toFixed(2);
  }

  function escapeHtml(text) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function showResult(type, label, content, meta, summary) {
    resultCard.className = "result-card " + type;
    resultLabel.textContent = label;
    resultContent.textContent = content;
    resultsMeta.textContent = meta || "";
    requestSummary.innerHTML = summary || "";
    resultsSection.classList.add("visible");
  }

  function buildSummary(body, elapsed) {
    var parts = [];
    parts.push("<span>index: " + escapeHtml(body.index_name) + "</span>");
    parts.push("<span>query: \"" + escapeHtml(body.query) + "\"</span>");
    if (body.filter) {
      parts.push("<span>filter: " + escapeHtml(body.filter) + "</span>");
    }
    parts.push("<span>elapsed: " + elapsed + "s</span>");
    return parts.join("");
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    var indexName = document.getElementById("indexName").value.trim();
    var query = document.getElementById("query").value.trim();
    var filter = document.getElementById("filter").value.trim();

    if (!indexName || !query) return;

    var body = {
      index_name: indexName,
      query: query
    };
    if (filter) {
      body.filter = filter;
    }

    submitBtn.disabled = true;
    resultsSection.classList.remove("visible");
    startTimer();

    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
    .then(function (res) {
      return res.json().then(function (data) {
        return { status: res.status, data: data };
      });
    })
    .then(function (result) {
      stopTimer();
      submitBtn.disabled = false;
      var elapsed = getElapsed();
      var summary = buildSummary(body, elapsed);

      if (result.data.error) {
        showResult(
          "error",
          "Error " + result.status,
          result.data.error,
          result.status + " response",
          summary
        );
      } else if (result.data.response) {
        showResult(
          "success",
          "Result",
          result.data.response,
          "200 OK in " + elapsed + "s",
          summary
        );
      } else {
        showResult(
          "error",
          "Unexpected Response",
          JSON.stringify(result.data, null, 2),
          result.status + " response",
          summary
        );
      }
    })
    .catch(function (err) {
      stopTimer();
      submitBtn.disabled = false;
      var elapsed = getElapsed();
      var summary = buildSummary(body, elapsed);

      showResult(
        "error",
        "Network Error",
        err.message || "Failed to reach the API. Check the endpoint URL and your network connection.",
        "Request failed",
        summary
      );
    });
  });
})();
</script>
</body>
</html>
